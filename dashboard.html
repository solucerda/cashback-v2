<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashback — Meu Painel</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html"><div class="brand-dot"></div>Cashback</a>
  <div class="topbar-right" id="topbar-right"></div>
</div>

<div class="page" id="content">
  <div class="loading"><div class="spinner"></div>Carregando seus dados...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/sheets.js"></script>
<script src="js/auth.js"></script>
<script>
const user = requireLogin();
if (user) init();

function init() {
  // Topbar
  document.getElementById('topbar-right').innerHTML = `
    <div class="user-chip">
      <div class="av">${initials(user.usuario)}</div>
      <span class="uname">${user.usuario}</span>
    </div>
    <button class="btn sm secondary" onclick="logout()">Sair</button>`;

  loadData();
}

async function loadData() {
  try {
    const [prods, payments] = await Promise.all([
      fetchProducts(user.aba),
      fetchPayments(user.aba),
    ]);
    render(user.aba, prods, payments);
  } catch(e) {
    showError('content', e.message);
  }
}

function logout() {
  clearSession();
  window.location.href = 'index.html';
}

function render(name, prods, payments) {
  const s    = calcStats(prods, payments);
  const top  = [...prods].sort((a, b) => b.comm - a.comm).slice(0, 6);
  const maxC = top[0]?.comm || 1;

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:700">${name}</h2>
      <p style="color:var(--gray-400);font-size:13px;margin-top:2px">${prods.length} produto${prods.length !== 1 ? 's' : ''} registrado${prods.length !== 1 ? 's' : ''}</p>
    </div>

    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Total em vendas</div>
        <div class="metric-value">${fmt(s.totalSales)}</div>
        <div class="metric-sub">${prods.length} itens</div>
      </div>
      <div class="metric-card hl">
        <div class="metric-label">Comissão gerada</div>
        <div class="metric-value">${fmt(s.totalComm)}</div>
        <div class="metric-sub">sobre suas compras</div>
      </div>
      <div class="metric-card hl">
        <div class="metric-label">Cashback (50%)</div>
        <div class="metric-value">${fmt(s.totalCashback)}</div>
        <div class="metric-sub">metade da comissão</div>
      </div>
      <div class="metric-card hl">
        <div class="metric-label">Já indenizado</div>
        <div class="metric-value">${fmt(s.totalInden)}</div>
        <div class="metric-sub">${pct(s.totalInden, s.totalCashback)} do cashback</div>
      </div>
      <div class="metric-card" style="grid-column:1/-1">
        <div class="metric-label">Pagamentos confirmados</div>
        <div class="metric-value">${s.totalPago} / ${prods.length}</div>
        <div class="metric-sub">${pct(s.totalPago, prods.length)} dos produtos</div>
      </div>
    </div>

    <div class="section-title">Produtos</div>

    <!-- Mobile: cards -->
    <div class="data-list">
      ${prods.map(p => `
        <div class="data-card">
          <div class="data-card-top">
            <div>
              <div class="data-card-num">#${p.num}</div>
              <div class="data-card-title">${p.desc}</div>
            </div>
            <span class="badge ${p.pago ? 'sim' : 'nao'}">${p.pago ? 'Pago' : 'Pendente'}</span>
          </div>
          <div class="data-card-rows">
            <div class="data-card-row"><span class="k">Venda</span><span class="v">${fmt(p.sales)}</span></div>
            <div class="data-card-row"><span class="k">Comissão</span><span class="v green">${fmt(p.comm)}</span></div>
          </div>
        </div>`).join('')}
    </div>

    <!-- Desktop: tabela -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Produto</th>
            <th class="r">Venda</th>
            <th class="r">Comissão</th>
            <th class="r">Pago</th>
          </tr>
        </thead>
        <tbody>
          ${prods.map(p => `
            <tr>
              <td class="muted">${p.num}</td>
              <td><div class="product-name" title="${p.desc}">${p.desc}</div></td>
              <td class="r">${fmt(p.sales)}</td>
              <td class="r green">${fmt(p.comm)}</td>
              <td class="r"><span class="badge ${p.pago ? 'sim' : 'nao'}">${p.pago ? 'Sim' : 'Não'}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="section-title">Histórico de pagamentos</div>

    ${payments.length ? `
      <!-- Mobile: cards -->
      <div class="data-list">
        ${payments.map(p => `
          <div class="data-card">
            <div class="data-card-top">
              <div>
                <div class="data-card-num">${p.data || 'Data não informada'}</div>
                <div class="data-card-title">Intervalo: ${p.intervalo || '—'}</div>
              </div>
              <span class="badge ${p.indenizado ? 'sim' : 'nao'}">${p.indenizado ? 'Pago' : 'Pendente'}</span>
            </div>
            <div class="data-card-rows">
              <div class="data-card-row"><span class="k">Valor</span><span class="v green">${fmt(p.valor)}</span></div>
            </div>
            ${p.isLink ? `
              <div class="data-card-actions">
                <a href="${p.comprovante}" target="_blank" rel="noopener" class="btn sm secondary" style="width:100%">📎 Ver comprovante</a>
              </div>` : ''}
          </div>`).join('')}
      </div>

      <!-- Desktop: tabela -->
      <div class="table-wrap" style="margin-bottom:28px">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Intervalo</th>
              <th class="r">Valor</th>
              <th class="r">Status</th>
              <th class="r">Comprovante</th>
            </tr>
          </thead>
          <tbody>
            ${payments.map(p => `
              <tr>
                <td>${p.data || '<span class="muted">—</span>'}</td>
                <td>${p.intervalo || '<span class="muted">—</span>'}</td>
                <td class="r green">${fmt(p.valor)}</td>
                <td class="r"><span class="badge ${p.indenizado ? 'sim' : 'nao'}">${p.indenizado ? 'Pago' : 'Pendente'}</span></td>
                <td class="r">
                  ${p.isLink
                    ? `<a href="${p.comprovante}" target="_blank" rel="noopener" class="btn sm secondary">Ver comprovante</a>`
                    : (p.comprovante ? `<span class="muted">${p.comprovante}</span>` : '<span class="muted">—</span>')}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    ` : '<div class="empty-state" style="margin-bottom:24px">Nenhum pagamento registrado ainda</div>'}

    <div class="section-title">Maiores comissões</div>
    <div class="bars-wrap">
      ${top.map(p => `
        <div class="bar-row">
          <div class="bar-name" title="${p.desc}">${p.desc.split(' ').slice(0, 3).join(' ')}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(p.comm / maxC * 100).toFixed(1)}%"></div></div>
          <div class="bar-val">${fmt(p.comm)}</div>
        </div>`).join('')}
    </div>`;
}
</script>
</body>
</html>
