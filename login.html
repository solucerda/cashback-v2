<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashback — Entrar</title>
<link rel="stylesheet" href="css/style.css">
<style>
.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 56px);
  padding: 40px 20px;
}
.login-box { width: 100%; max-width: 380px; }
.login-box h2 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.login-box .sub { color: var(--gray-500); font-size: 13px; margin-bottom: 28px; }
.login-box .btn { width: 100%; margin-top: 4px; }
.login-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--gray-500); }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html"><div class="brand-dot"></div>Cashback</a>
</div>

<div class="login-wrap">
  <div class="login-box">
    <h2>Entrar</h2>
    <p class="sub">Acesse seus dados de cashback</p>

    <div class="field">
      <label>Usuário</label>
      <input type="text" id="input-user" placeholder="seu.usuario" autocomplete="username" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="input-pass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()" />
    </div>

    <div class="error-msg" id="login-error"></div>
    <button class="btn" id="btn-login" onclick="doLogin()">Entrar</button>

    <div class="login-footer">
      <a class="link-btn" href="index.html">← Ver ranking público</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/sheets.js"></script>
<script src="js/auth.js"></script>
<script>
// Se já está logado, redireciona
const session = getSession();
if (session) {
  window.location.href = session.admin ? 'admin.html' : 'dashboard.html';
}

async function doLogin() {
  const user = document.getElementById('input-user').value.trim().toLowerCase();
  const pass = document.getElementById('input-pass').value.trim();
  const err  = document.getElementById('login-error');
  const btn  = document.getElementById('btn-login');

  err.textContent = '';
  if (!user || !pass) { err.textContent = 'Preencha usuário e senha.'; return; }

  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const users = await fetchUsers();
    const found = users.find(u => u.usuario === user && u.senha === pass);

    if (!found) {
      err.textContent = 'Usuário ou senha incorretos.';
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    saveSession(found);
    window.location.href = found.admin ? 'admin.html' : 'dashboard.html';

  } catch(e) {
    err.textContent = 'Erro ao conectar: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}
</script>
</body>
</html>
